<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_32 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_32" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_32');
  const devicePixelRatio = window.devicePixelRatio || 1;
  (function() {
  const container = document.getElementById('threejs-container-GROWTH_CORE');
  if (!container) return;

  const width = container.clientWidth || window.innerWidth;
  const height = container.clientHeight || window.innerHeight;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setSize(width, height);
  renderer.setPixelRatio(window.devicePixelRatio);
  container.appendChild(renderer.domElement);

  // Lights
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambientLight);

  const pointLight = new THREE.PointLight(0x7c3aed, 2, 10);
  pointLight.position.set(2, 2, 2);
  scene.add(pointLight);

  // The "Identity Core" - An evolving geometric structure
  const group = new THREE.Group();
  scene.add(group);

  // Inner Core (Experience)
  const coreGeom = new THREE.OctahedronGeometry(1, 0);
  const coreMat = new THREE.MeshPhongMaterial({
    color: 0x7c3aed,
    emissive: 0x2e1065,
    flatShading: true,
    transparent: true,
    opacity: 0.9
  });
  const core = new THREE.Mesh(coreGeom, coreMat);
  group.add(core);

  // Wireframe shell (Network/Collaboration)
  const shellGeom = new THREE.IcosahedronGeometry(1.6, 1);
  const shellMat = new THREE.MeshBasicMaterial({
    color: 0x7c3aed,
    wireframe: true,
    transparent: true,
    opacity: 0.2
  });
  const shell = new THREE.Mesh(shellGeom, shellMat);
  group.add(shell);

  // Orbiting "Skill" points
  const pointsCount = 6;
  const points = [];
  const dotGeom = new THREE.SphereGeometry(0.08, 16, 16);
  const dotMat = new THREE.MeshStandardMaterial({ color: 0x10b981, emissive: 0x10b981, emissiveIntensity: 0.5 });

  for (let i = 0; i < pointsCount; i++) {
    const point = new THREE.Mesh(dotGeom, dotMat);
    const angle = (i / pointsCount) * Math.PI * 2;
    point.userData = { angle: angle, speed: 0.01 + Math.random() * 0.01, dist: 1.8 };
    points.push(point);
    group.add(point);
  }

  camera.position.z = 4;

  function animate() {
    requestAnimationFrame(animate);
    
    group.rotation.y += 0.005;
    core.rotation.x += 0.01;
    
    const time = Date.now() * 0.001;
    core.scale.setScalar(1 + Math.sin(time) * 0.05);

    points.forEach(p => {
      p.userData.angle += p.userData.speed;
      p.position.x = Math.cos(p.userData.angle) * p.userData.dist;
      p.position.z = Math.sin(p.userData.angle) * p.userData.dist;
      p.position.y = Math.sin(p.userData.angle * 2) * 0.5;
    });

    renderer.render(scene, camera);
  }

  animate();

  window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });
})();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_32 -->
</body>
</html>
