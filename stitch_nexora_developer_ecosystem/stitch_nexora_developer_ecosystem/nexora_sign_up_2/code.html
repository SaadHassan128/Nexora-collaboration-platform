<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Magnetic Button Effect
        const magneticBtns = document.querySelectorAll('.btn-magnetic');
        
        magneticBtns.forEach(btn => {
            btn.addEventListener('mousemove', (e) => {
                const rect = btn.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                
                // Scale down the movement for a subtle effect
                btn.style.transform = `perspective(1000px) rotateX(${-y * 0.15}deg) rotateY(${x * 0.15}deg) translateZ(10px)`;
            });
            
            btn.addEventListener('mouseleave', () => {
                btn.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) translateZ(0px)`;
            });
        });

        // Password Strength Indicator
        const pwdInput = document.getElementById('password');
        const pwdFill = document.getElementById('pwd-fill');
        
        if (pwdInput && pwdFill) {
            pwdInput.addEventListener('input', (e) => {
                const val = e.target.value;
                let strength = 0;
                
                if (val.length > 0) strength += 25;
                if (val.length >= 8) strength += 25;
                if (/[A-Z]/.test(val) || /[a-z]/.test(val)) strength += 25;
                if (/[0-9!@#$%^&*]/.test(val)) strength += 25;
                
                pwdFill.style.width = `${strength}%`;
                
                // Color progression
                if (strength <= 25) {
                    pwdFill.style.backgroundColor = '#ffb4ab'; // Error
                } else if (strength <= 50) {
                    pwdFill.style.backgroundColor = '#ffb784'; // Tertiary
                } else if (strength <= 75) {
                    pwdFill.style.backgroundColor = '#89ceff'; // Secondary
                } else {
                    pwdFill.style.backgroundColor = '#7c3aed'; // Primary Container
                }
            });
        }
    });
</script>
