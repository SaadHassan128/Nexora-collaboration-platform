<script>
        // Simulate skill tags
        const skills = ['Angular', 'React', 'Node.js', 'Backend', 'Frontend', 'UI/UX', 'Database', 'DevOps', 'Python', 'Go'];
        const container = document.getElementById('skill-tags');
        
        // This is just to show how step 1 would look if it was visible
        skills.forEach(skill => {
            const btn = document.createElement('button');
            btn.className = 'skill-tag px-4 py-2 rounded-full border border-border-subtle bg-surface-dim text-silver-text font-code-sm text-code-sm hover:border-outline-variant hover:bg-surface-variant';
            btn.textContent = skill;
            btn.onclick = () => btn.classList.toggle('active');
            container.appendChild(btn);
        });

        // Level selection logic
        const levelCards = document.querySelectorAll('.level-card');
        levelCards.forEach(card => {
            card.addEventListener('click', () => {
                levelCards.forEach(c => {
                    c.classList.remove('active', 'border-primary');
                    c.classList.add('border-border-subtle');
                    const icon = c.querySelector('.material-symbols-outlined');
                    const title = c.querySelector('h3');
                    icon.classList.remove('text-primary');
                    icon.classList.add('text-silver-text');
                    icon.style.fontVariationSettings = "'FILL' 0";
                    title.classList.remove('text-primary');
                    title.classList.add('text-on-surface');
                });
                
                card.classList.add('active', 'border-primary');
                card.classList.remove('border-border-subtle');
                const activeIcon = card.querySelector('.material-symbols-outlined');
                const activeTitle = card.querySelector('h3');
                activeIcon.classList.remove('text-silver-text');
                activeIcon.classList.add('text-primary');
                activeIcon.style.fontVariationSettings = "'FILL' 1";
                activeTitle.classList.remove('text-on-surface');
                activeTitle.classList.add('text-primary');
            });
        });
    </script>
