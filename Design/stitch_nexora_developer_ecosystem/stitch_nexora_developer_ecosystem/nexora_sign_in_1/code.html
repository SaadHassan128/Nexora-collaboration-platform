<style>
        body {
            background-color: theme('colors.deep-obsidian');
            color: theme('colors.on-background');
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeScaleIn {
            0% { opacity: 0; transform: scale(0.98) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-entrance {
            animation: fadeScaleIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        .glass-card {
            background-color: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid theme('colors.border-subtle');
            box-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.05);
        }

        .primary-glow {
            box-shadow: 0 0 20px 0 rgba(168, 85, 247, 0.15);
        }
        
        .input-field {
            background-color: #0A0A0A;
            border: 1px solid theme('colors.border-subtle');
            color: theme('colors.on-background');
            transition: all 0.2s ease;
        }
        
        .input-field:focus {
            border-color: theme('colors.electric-purple');
            outline: none;
            box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.2);
        }

        .input-field::placeholder {
            color: transparent;
            transition: color 0.2s ease;
        }
        .input-field:focus::placeholder {
            color: rgba(204, 195, 216, 0.4);
        }

        .btn-primary {
            background: linear-gradient(to right, theme('colors.electric-purple'), theme('colors.secondary-container'));
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            box-shadow: 0 0 20px 0 rgba(168, 85, 247, 0.25);
        }

        .btn-magnetic {
            will-change: transform;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .btn-ghost {
            background-color: transparent;
            color: theme('colors.silver-text');
            transition: all 0.2s ease;
        }

        .btn-ghost:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* Abstract Background Glow */
        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.08) 0%, rgba(5, 5, 5, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
        }
      </style>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const magneticBtn = document.querySelector('.btn-magnetic');
        if (magneticBtn) {
            magneticBtn.addEventListener('mousemove', (e) => {
                const rect = magneticBtn.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                
                const moveX = (x / (rect.width / 2)) * 8;
                const moveY = (y / (rect.height / 2)) * 8;
                
                magneticBtn.style.transform = `translate(${moveX}px, ${moveY}px)`;
                magneticBtn.style.transition = 'none';
            });
            
            magneticBtn.addEventListener('mouseleave', () => {
                magneticBtn.style.transform = 'translate(0px, 0px)';
                magneticBtn.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1)';
            });
        }
    });
</script>
