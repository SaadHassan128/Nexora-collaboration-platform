<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_38 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_38" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_38');
  const devicePixelRatio = window.devicePixelRatio || 1;
  (function() {
  const container = document.getElementById('threejs-container-PORTFOLIO_CORE');
  if (!container) return;

  const width = container.clientWidth || window.innerWidth;
  const height = container.clientHeight || window.innerHeight;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setSize(width, height);
  renderer.setPixelRatio(window.devicePixelRatio);
  container.appendChild(renderer.domElement);

  // Lights
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
  scene.add(ambientLight);

  const pointLight = new THREE.PointLight(0x7c3aed, 2, 15);
  pointLight.position.set(5, 5, 5);
  scene.add(pointLight);

  // The "Portfolio Core" - A radiant, multi-faceted prism representing the "Complete Story"
  const group = new THREE.Group();
  scene.add(group);

  const geometry = new THREE.IcosahedronGeometry(1.5, 1);
  const material = new THREE.MeshPhongMaterial({
    color: 0x7c3aed,
    emissive: 0x2e1065,
    flatShading: true,
    transparent: true,
    opacity: 0.8,
    shininess: 100
  });
  const core = new THREE.Mesh(geometry, material);
  group.add(core);

  // Outer wireframe for "Product Network"
  const wireGeom = new THREE.IcosahedronGeometry(1.8, 1);
  const wireMat = new THREE.MeshBasicMaterial({
    color: 0x7c3aed,
    wireframe: true,
    transparent: true,
    opacity: 0.1
  });
  const wire = new THREE.Mesh(wireGeom, wireMat);
  group.add(wire);

  // Floating achievement nodes (Project completions)
  const nodeCount = 5;
  const nodes = [];
  const nodeGeom = new THREE.BoxGeometry(0.2, 0.2, 0.2);
  const nodeMat = new THREE.MeshStandardMaterial({ 
    color: 0x10b981, 
    emissive: 0x10b981, 
    emissiveIntensity: 1 
  });

  for (let i = 0; i < nodeCount; i++) {
    const node = new THREE.Mesh(nodeGeom, nodeMat);
    const angle = (i / nodeCount) * Math.PI * 2;
    const dist = 2.5;
    node.position.set(
      Math.cos(angle) * dist,
      Math.sin(angle) * dist,
      (Math.random() - 0.5) * 2
    );
    node.userData = { angle: angle, speed: 0.005 + Math.random() * 0.01, dist: dist };
    nodes.push(node);
    group.add(node);
  }

  camera.position.z = 6;

  function animate() {
    requestAnimationFrame(animate);
    
    group.rotation.y += 0.002;
    core.rotation.x += 0.005;
    
    const time = Date.now() * 0.001;
    core.scale.setScalar(1 + Math.sin(time) * 0.05);

    nodes.forEach(n => {
      n.userData.angle += n.userData.speed;
      n.position.x = Math.cos(n.userData.angle) * n.userData.dist;
      n.position.z = Math.sin(n.userData.angle) * n.userData.dist;
      n.rotation.y += 0.02;
    });

    renderer.render(scene, camera);
  }

  animate();

  window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });
})();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_38 -->
</body>
</html>
